<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gestión de Tienda - SILC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="#">Gestión de Tienda</a>
      <div class="d-flex align-items-center">
        <span id="userInfo" class="me-3"></span>
        <a href="php/logout.php" class="btn btn-outline-danger btn-sm">Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header d-flex justify-content-between align-items-center">
            <strong>Productos</strong>
            <div>
              <button id="agregarProductoBtn" class="btn btn-success btn-sm me-2">+ Agregar Producto</button>
              <button id="generarReporteBtn" class="btn btn-outline-danger btn-sm me-2">Generar Reporte PDF</button>
              <button id="verCarritoBtn" class="btn btn-outline-primary btn-sm">Ver carrito (<span id="cartCount">0</span>)</button>
            </div>
          </div>
          <div class="card-body">
            <input type="text" id="buscadorProducto" class="form-control mb-3" placeholder="Buscar producto por nombre..." autocomplete="off">
            <table class="table table-striped" id="productTable">
              <thead><tr><th>Nombre</th><th>Precio</th><th>Cantidad</th><th>Acciones</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div id="userSection" class="card mb-4 d-none">
          <div class="card-header"><strong>Usuarios (admin)</strong></div>
          <div class="card-body">
            <table class="table table-sm" id="userTable">
              <thead><tr><th>Usuario</th><th>Rol</th><th></th></tr></thead>
              <tbody></tbody>
            </table>

            <hr>
            <h6>Crear Usuario</h6>
            <form id="userForm">
              <div class="mb-2">
                <input id="newUsername" class="form-control" placeholder="Usuario" required>
              </div>
              <div class="mb-2">
                <input id="newPassword" type="password" class="form-control" placeholder="Contraseña" required>
              </div>
              <div class="mb-2">
                <select id="newRol" class="form-select">
                  <option value="empleado">Empleado</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="d-grid">
                <button class="btn btn-primary" type="submit">Crear Usuario</button>
              </div>
            </form>

          </div>
        </div>

        <div class="card">
          <div class="card-body text-muted small">
           Sección para edición de usuarios.
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="modal fade" id="productoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="formProductoTitulo">Agregar Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <form id="productForm">
          <div class="modal-body">
            <input type="hidden" id="productId">
            <div class="mb-3">
              <label for="productName" class="form-label">Nombre</label>
              <input id="productName" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="mb-3">
              <label for="productPrice" class="form-label">Precio</label>
              <input id="productPrice" type="number" step="0.01" class="form-control" placeholder="Precio" required>
            </div>
            <div class="mb-3">
              <label for="productCantidad" class="form-label">Cantidad</label>
              <input id="productCantidad" type="number" class="form-control" placeholder="Cantidad" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button class="btn btn-success" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="carritoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Carrito de Compra</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <table class="table" id="cartTable">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Precio Unit.</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr class="table-active">
                <td colspan="3" class="text-end"><strong>Total a Pagar:</strong></td>
                <td><strong id="totalPagar">$0.00</strong></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
          <div id="carritoVacio" class="text-center text-muted py-3" style="display:none;">
            El carrito está vacío
          </div>
        </div>
        <div class="modal-footer">
          <button id="applyDiscount" class="btn btn-success">Procesar Compra</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/view.js?v=4"></script>
  <script src="js/model.js?v=3"></script>
  <script src="js/controller.js?v=5"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
